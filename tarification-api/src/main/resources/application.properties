spring.application.name=tarification-api
server.port=9090

# CONFIGURATION POSTGRESQL (DOCKER)
# ----------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5433/mairie_tarification
spring.datasource.username=postgres
spring.datasource.password=admin

# Stratégie de mise à jour de la base (Hibernate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Chemin vers le fichier XLSX de simulation budgetaire
simulation.fichier.excel=CALC DEP(4).xlsx
